name: Architecture Seam Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  seam-tests:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run architecture seam tests
        run: |
          chmod +x scripts/test-architecture-seams.sh
          scripts/test-architecture-seams.sh
